<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xnui | Premium Digital Interfaces</title>
    <meta name="description" content="xnui is a boutique visual design studio led by expert UX designer and graphic design architect Sofia Varian, offering premium UX services and responsive tactile layouts." />
    <meta name="keywords" content="xnui, Graphic Designer, Visual Designer, UX Designer, UX Service, UI UX Design Studio, Tactile Interfaces, Interactive Objects, Layout Design, Sofia Varian, Feelize, Verlet simulation, creative developer portfolio" />
    <meta name="author" content="Sofia Varian" />
    <meta name="theme-color" content="#fbfbfb" />
    
    <!-- Meta Robots to guarantee high crawling priority -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    
    <!-- Geo Location Metadata for contextual indexing -->
    <meta name="geo.region" content="US-CA" />
    <meta name="geo.placename" content="San Francisco" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://xnui.com" />
    <meta property="og:title" content="xnui | Premium Digital Interfaces" />
    <meta property="og:description" content="Boutique design studio crafting elegant layout systems and tactile digital experiences." />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://xnui.com" />
    <meta property="twitter:title" content="xnui | Premium Digital Interfaces" />
    <meta property="twitter:description" content="Boutique design studio crafting elegant layout systems and tactile digital experiences." />
    <meta property="twitter:image" content="/og-image.jpg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://xnui.com/" />

    <!-- Dynamic JSON-LD structured schema script -->
    <script id="dynamic-jsonld" type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "xnui",
      "url": "https://xnui.com/",
      "description": "Boutique digital design studio crafting high-fidelity design systems, layout blueprints, and tactile web interfaces."
    }
    </script>
    
    <!-- Preconnect to Google Fonts for optimal load speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
